name: Build eBPF Module

on:
  push:
    branches:
      - ebpf
  pull_request:
    branches:
      - ebpf
  workflow_dispatch:

env:
  ANDROID_NDK_VERSION: r26d

jobs:
  # Build for host (x86_64)
  build-host:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang llvm libbpf-dev pkg-config linux-tools-generic

    - name: Build for host
      run: |
        make clean 2>/dev/null || true
        make bpf skeleton 2>&1

    - name: Build loader
      run: |
        make loader 2>&1 || echo "Loader build skipped (needs libbpf)"
        file hook_loader 2>/dev/null || true

    - name: Upload host artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ebpf-host
        path: |
          *.o
          *.skel.h
          hook_loader
        retention-days: 7

  # Build for Android (ARM64)
  build-android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Download Android NDK
      run: |
        wget -q https://dl.google.com/android/repository/android-ndk-${{ env.ANDROID_NDK_VERSION }}-linux.zip -O ndk.zip
        unzip -q ndk.zip
        ls -la android-ndk-${{ env.ANDROID_NDK_VERSION }}/

    - name: Set up Android NDK
      run: |
        echo "ANDROID_NDK_ROOT=$PWD/android-ndk-${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV
        export PATH=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
        which aarch64-linux-android34-clang || which aarch64-linux-android21-clang || echo "Clang not found"
        which aarch64-linux-android34-ld || echo "Linker not found"

    - name: Build BPF object
      run: |
        sudo apt-get install -y clang llvm
        make clean 2>/dev/null || true
        make bpf 2>&1 || true

    - name: Build Android binary
      run: |
        export ANDROID_NDK_ROOT=$PWD/android-ndk-${{ env.ANDROID_NDK_VERSION }}
        export PATH=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
        
        echo "=== Building Android ARM64 binary ==="
        
        # Use NDK clang with static linking
        aarch64-linux-android34-clang \
          -static \
          -O2 \
          -Wall \
          -o hook_android \
          hook_android.c \
          2>&1
        
        echo "=== Build result ==="
        ls -la hook_android 2>/dev/null || echo "Build failed"
        file hook_android 2>/dev/null || true

    - name: Upload Android artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ebpf-android
        path: |
          *.o
          *.skel.h
          hook_android
        retention-days: 7
