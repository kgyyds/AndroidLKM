name: Build HOOK.ko (DDK)

on:
  workflow_call:
    inputs:
      kmi:
        description: 'KMI version'
        required: true
        type: string
      ddk_release:
        description: 'DDK release version'
        required: false
        default: '20260313'
        type: string

jobs:
  build-hook-ko:
    name: Build hook.ko for ${{ inputs.kmi }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ylarod/ddk-min:${{ inputs.kmi }}-${{ inputs.ddk_release }}
      options: --privileged

    steps:
    - name: Checkout source code
      uses: actions/checkout@v6

    - name: Build hook.ko
      run: |
        echo "=== Building hook.ko for KMI: ${{ inputs.kmi }} ==="

        # 和 KernelSU 完全一样的方式编译
        # 不需要指定 ARCH/CROSS_COMPILE，DDK 容器已设置好
        CONFIG_HOOK=m CC=clang make

        echo "=== Build completed ==="

        if [ ! -f hook.ko ]; then
          echo "ERROR: hook.ko not found!"
          exit 1
        fi

        # 创建输出目录
        mkdir -p /github/workspace/out

        # 复制输出文件
        OUTPUT_NAME="${{ inputs.kmi }}_hook.ko"
        cp hook.ko "/github/workspace/out/$OUTPUT_NAME"

        echo "Copied to: /github/workspace/out/$OUTPUT_NAME"
        ls -la "/github/workspace/out/$OUTPUT_NAME"

        # strip
        llvm-strip -d "/github/workspace/out/$OUTPUT_NAME"
        echo "Size after strip: $(du -h "/github/workspace/out/$OUTPUT_NAME" | cut -f1)"

    - name: Upload hook.ko artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.kmi }}-hook
        path: /github/workspace/out/${{ inputs.kmi }}_hook.ko
